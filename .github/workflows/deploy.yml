name: Deploy Application to VPS

on:
  push:
    branches:
      - main # Kích hoạt khi push vào nhánh main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build và Push Frontend Image (Có truyền biến môi trường)
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Đường dẫn tới thư mục chứa Vite
          file: ./frontend/Dockerfile
          push: true
          tags: congtoan0101/vite-app:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }} # Truyền secret từ GitHub vào Docker

      # 2. Build và Push Backend Image (Spring Boot)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Đường dẫn tới thư mục chứa Spring Boot
          file: ./backend/Dockerfile
          push: true
          tags: congtoan0101/springboot-app:latest

      # 3. SSH vào VPS để ra lệnh Deploy
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /path/to/your/project-on-vps
            
            # Kéo image mới nhất về và khởi động lại
            docker-compose pull
            docker-compose up -d --remove-orphans