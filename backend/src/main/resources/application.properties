spring.application.name=backend


#Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.properties.hibernate.types.auto_register=true


#Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=existing-schema
spring.jpa.properties.hibernate.statement_cache.size=0
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
#Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
#
##Message_Lang
#spring.messages.basename=messages
#spring.messages.encoding=UTF-8
#app.language=vi



#Security
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# JWT Configurations
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.oauth2.redirect-uri-frontend=${OAUTH2_REDIRECT_URI_FRONTEND:http://localhost:5173/oauth2/success}
#app.oauth2.redirect-uri-frontend=${APP_OAUTH2_REDIRECT_URI_FRONTEND:http://localhost:5173/oauth2/success}

app.password-reset.redirect-uri=${PASSWORD_RESET_REDIRECT_URI:http://localhost:5173/reset-password}
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
server.forward-headers-strategy=framework
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.migrate-base64=false
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8001}
ai.service.timeout-seconds=${AI_SERVICE_TIMEOUT_SECONDS:30}

#API Frontend
api.frontend=${API_FRONTEND:http://localhost:5173}

spring.datasource.hikari.data-source-properties.prepareThreshold=0
