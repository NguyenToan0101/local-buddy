services:
  frontend:
    image: congtoan0101/vite-app:latest
    ports:
      - "5173:80"
    restart: unless-stopped

  backend:
    image: congtoan0101/springboot-app:latest
    env_file:
      - ${BACKEND_ENV_FILE:-/etc/local-buddy/backend.env}
    ports:
      - "8080:8080"
    restart: unless-stopped
